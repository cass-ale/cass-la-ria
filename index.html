<!DOCTYPE html>
<html lang="en" prefix="og: https://ogp.me/ns#">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- ============================================================
       SEO META TAGS
       Modeled after industry-standard implementations used by
       brunomars.com, szasos.com, and teddyswims.com.
       Sources:
         - https://dev.to/mikasa_ackerman_bdcad109a/the-developer-seo-checklist-you-actually-need-5b09
         - https://ogp.me/
         - https://developers.google.com/search/docs/fundamentals/seo-starter-guide
       ============================================================ -->

  <!-- Primary Meta Tags -->
  <title>Cass la Ria | Official Website</title>
  <meta name="title" content="Cass la Ria | Official Website" />
  <meta name="description" content="Official website of Cass la Ria. Multi-faceted creative — music, video, and visual art." />
  <meta name="author" content="Cass Aleria" />
  <meta name="keywords" content="Cass la Ria, Cass Aleria, casslaria, alriamustdie, music, creative, artist" />
  <meta name="robots" content="index, follow, noimageai, noai" />
  <meta name="theme-color" content="#f2d4d7" />
  <link rel="canonical" href="https://caprilaria.netlify.app/" />

  <!-- Open Graph / Facebook / Instagram / Discord
       Controls how the site appears when shared on social platforms.
       og:image dimensions: 1200x630px (recommended by Facebook).
       Reference: https://ogp.me/ -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Cass la Ria" />
  <meta property="og:url" content="https://caprilaria.netlify.app/" />
  <meta property="og:title" content="Cass la Ria | Official Website" />
  <meta property="og:description" content="Official website of Cass la Ria. Multi-faceted creative — music, video, and visual art." />
  <meta property="og:image" content="https://caprilaria.netlify.app/assets/images/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Cass la Ria — name displayed in elegant serif typography on a soft pink background with a decorative border" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter / X Card
       summary_large_image shows a large preview card (like SZA and Teddy Swims use).
       Reference: https://developer.x.com/en/docs/twitter-for-websites/cards -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://caprilaria.netlify.app/" />
  <meta name="twitter:title" content="Cass la Ria | Official Website" />
  <meta name="twitter:description" content="Official website of Cass la Ria. Multi-faceted creative — music, video, and visual art." />
  <meta name="twitter:image" content="https://caprilaria.netlify.app/assets/images/og-image.png" />
  <meta name="twitter:image:alt" content="Cass la Ria — name displayed in elegant serif typography on a soft pink background" />

  <!-- Privacy & Security meta tags (HTML-level fallbacks) -->
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />

  <!-- Mobile-specific meta tags (following Bruno Mars / Teddy Swims pattern) -->
  <meta name="MobileOptimized" content="width" />
  <meta name="HandheldFriendly" content="true" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Cass la Ria" />

  <!-- PWA Web App Manifest — enables "Add to Home Screen" on mobile.
       Reference: https://web.dev/articles/add-manifest
       Reference: https://developer.mozilla.org/en-US/docs/Web/Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Hreflang — tells search engines which language variants exist.
       Since this is a single-page site with JS-based language switching,
       all hreflang tags point to the same URL with a language parameter.
       Google uses these to serve the correct language in search results.
       Reference: https://developers.google.com/search/docs/specialty/international/localized-versions -->
  <link rel="alternate" hreflang="en" href="https://caprilaria.netlify.app/" />
  <link rel="alternate" hreflang="es" href="https://caprilaria.netlify.app/?lang=es" />
  <link rel="alternate" hreflang="pt" href="https://caprilaria.netlify.app/?lang=pt" />
  <link rel="alternate" hreflang="fr" href="https://caprilaria.netlify.app/?lang=fr" />
  <link rel="alternate" hreflang="ja" href="https://caprilaria.netlify.app/?lang=ja" />
  <link rel="alternate" hreflang="ko" href="https://caprilaria.netlify.app/?lang=ko" />
  <link rel="alternate" hreflang="id" href="https://caprilaria.netlify.app/?lang=id" />
  <link rel="alternate" hreflang="zh" href="https://caprilaria.netlify.app/?lang=zh" />
  <link rel="alternate" hreflang="x-default" href="https://caprilaria.netlify.app/" />

  <!-- Structured Data — JSON-LD (enhanced MusicGroup + Person schema)
       Expanded from basic Person to include MusicGroup type for better
       categorization in Google's Knowledge Graph. Includes genre, contact,
       and knowsLanguage for multilingual SEO.
       Reference: https://schema.org/MusicGroup
       Reference: https://schema.org/Person
       Reference: https://inclassics.com/blog/seo-for-musicians-schema-markup -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": ["Person", "MusicGroup"],
    "name": "Cass la Ria",
    "alternateName": ["Cass Aleria", "casslaria", "alriamustdie"],
    "url": "https://caprilaria.netlify.app/",
    "image": "https://caprilaria.netlify.app/assets/images/og-image.png",
    "sameAs": [
      "https://www.youtube.com/@casslaria",
      "https://www.tiktok.com/@alriamustdie",
      "https://www.instagram.com/casslaria"
    ],
    "jobTitle": "Creative",
    "description": "Multi-faceted creative — music, video, and visual art.",
    "email": "admin@caprilaria.com",
    "knowsLanguage": ["en", "es", "pt", "fr", "ja", "ko", "id", "zh"]
  }
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="assets/icons/favicon-48x48.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/favicon-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/favicon-512x512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png" />

  <!-- Fonts (self-hosted — zero external requests for Latin) -->
  <link rel="stylesheet" href="css/fonts.css?v=4" />

  <!-- CJK Fonts — loaded on-demand via Google Fonts with text= subsetting.
       Only the exact characters used on this site are downloaded (~17KB each
       vs 9MB+ for full CJK fonts). Loaded lazily via JS when a CJK language
       is selected, so zero cost for Latin-only visitors.
       Preconnect hints allow DNS/TLS to happen early if CJK is needed. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/fonts-cjk.css?v=2" />

  <!-- Styles — version query strings bust immutable cache headers.
       Update ?v= on every deploy that changes CSS. -->
  <link rel="stylesheet" href="css/variables.css?v=4" />
  <link rel="stylesheet" href="css/reset.css?v=4" />
  <link rel="stylesheet" href="css/layout.css?v=4" />
  <link rel="stylesheet" href="css/components.css?v=4" />
  <link rel="stylesheet" href="css/animations.css?v=4" />
  <link rel="stylesheet" href="css/rain.css?v=4" />

  <!-- CJK font stylesheets — loaded lazily by JS when a CJK language is selected.
       The link tags are inserted here as placeholders with media="print" to prevent
       blocking, then activated by the i18n system. See js/main.js switchLanguage(). -->
</head>
<body>

  <!-- Skip to content link for keyboard/screen reader users.
       Uses sr-only pattern (clip + clip-path) so it is truly
       invisible in ALL browsers including Instagram WebView,
       but still focusable for keyboard users. -->
  <a href="#main-content" class="skip-link" data-i18n="skip-link">Skip to content</a>

  <main id="main-content" class="hero">

    <div class="frame" aria-hidden="true"></div>

    <header class="hero__header">

      <div class="hero__rule" aria-hidden="true"></div>
    </header>

  </main>

  <!-- Language switcher — globe icon in the bottom-right corner.
       Uses native script labels ("日本語" not "Japanese") per UX best practice.
       Globe icon, not flags (flags = countries, not languages).
       Sources:
         - Smashing Magazine: smashingmagazine.com/2022/05/designing-better-language-selector
         - NNGroup: nngroup.com/articles/language-switching-ecommerce
         - CodyHouse: codyhouse.co/blog/post/accessible-language-picker -->
  <div class="lang-switcher" role="navigation" aria-label="Language">
    <button
      class="lang-switcher__trigger"
      aria-expanded="false"
      aria-haspopup="listbox"
      aria-label="Change language"
      id="lang-trigger"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" />
        <path d="M2 12h20" />
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
      </svg>
    </button>
    <ul class="lang-switcher__list" role="listbox" id="lang-list" aria-label="Select language">
      <li role="option"><button class="lang-switcher__option" data-lang="en" aria-current="true">English</button></li>
      <li role="option"><button class="lang-switcher__option" data-lang="es">Español</button></li>
      <li role="option"><button class="lang-switcher__option" data-lang="fr">Français</button></li>
      <li role="option"><button class="lang-switcher__option" data-lang="id">Bahasa Indonesia</button></li>
      <li role="option"><button class="lang-switcher__option" data-lang="ja">日本語</button></li>
      <li role="option"><button class="lang-switcher__option" data-lang="ko">한국어</button></li>
      <li role="option"><button class="lang-switcher__option" data-lang="pt">Português</button></li>
      <li role="option"><button class="lang-switcher__option" data-lang="zh">中文</button></li>
    </ul>
  </div>

  <!-- Site credit (hidden from visual display, visible to crawlers and view-source) -->

  <!-- Scripts — version query strings bust immutable cache headers.
       Update ?v= on every deploy that changes JS. -->
  <script src="js/i18n.js?v=2"></script>
  <script src="js/main.js?v=6"></script>
  <script src="js/time-theme.js?v=1"></script>
  <script src="js/rain.js?v=10"></script>
  <script src="js/wet-text.js?v=4"></script>

  <!-- Service Worker registration — enables PWA install + offline caching.
       Registered after all other scripts to avoid blocking the main thread.
       The SW uses a stale-while-revalidate strategy for core assets.
       Reference: https://developer.mozilla.org/en-US/docs/Web/API/Service_Worker_API -->
  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js').catch(function() {});
    });
  }
  </script>
</body>
