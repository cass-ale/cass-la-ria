# ============================================================
# Netlify Configuration — Cass la Ria
# Plain static site (HTML/CSS/JS). No build step.
#
# Security headers follow OWASP HTTP Headers Cheat Sheet:
# https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html
# ============================================================

[build]
  # No build command — the site is pre-built static files.
  publish = "."

# ============================================================
# GLOBAL SECURITY & PRIVACY HEADERS
# Applied to every response from the site.
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    # -- Clickjacking protection --
    X-Frame-Options = "DENY"

    # -- Prevent MIME type sniffing / confusion attacks --
    X-Content-Type-Options = "nosniff"

    # -- Disable legacy XSS filter (OWASP recommends off; CSP replaces it) --
    X-XSS-Protection = "0"

    # -- Limit referrer leakage for user privacy --
    Referrer-Policy = "strict-origin-when-cross-origin"

    # -- Force HTTPS for 2 years + preload list eligibility --
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # -- Content Security Policy --
    # Self-contained site: only own scripts, styles, fonts, images allowed.
    # No inline scripts, no inline styles, no external resources.
    # frame-ancestors 'none' replaces X-Frame-Options for modern browsers.
    # form-action 'none' blocks form submissions (site has no forms).
    Content-Security-Policy = "default-src 'none'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; upgrade-insecure-requests"

    # -- Disable browser features we don't use --
    # interest-cohort=() blocks Google FLoC tracking.
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"

    # -- Prevent cross-origin window interaction --
    Cross-Origin-Opener-Policy = "same-origin"

    # -- Prevent other sites from embedding our resources --
    Cross-Origin-Resource-Policy = "same-origin"

# ============================================================
# CACHE CONTROL
# Static assets: aggressive immutable caching.
# HTML: always revalidate for fresh content.
# ============================================================

# CSS files
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JavaScript files
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Assets (fonts, images, video, audio, icons)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML — always revalidate
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ============================================================
# POST PROCESSING
# Disable CSS/JS bundling/minification to prevent Netlify
# from breaking valid styles (known issue with static sites).
# ============================================================
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true
