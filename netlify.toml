# ============================================================
# Netlify Configuration — Cass la Ria
#
# Build: bash build.sh produces dist/ with content-hashed
# CSS/JS filenames (e.g., styles.a1b2c3d4.css). This follows
# the industry-standard "immutable content + long max-age"
# pattern for optimal caching and guaranteed freshness.
#
# Reference: https://jakearchibald.com/2016/caching-best-practices/
# Reference: https://web.dev/articles/use-long-term-caching
#
# Security headers follow OWASP HTTP Headers Cheat Sheet:
# https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html
# ============================================================

[build]
  command = "bash build.sh"
  publish = "dist"

# ============================================================
# GLOBAL SECURITY & PRIVACY HEADERS
# Applied to every response from the site.
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    # -- Clickjacking protection --
    X-Frame-Options = "DENY"

    # -- Prevent MIME type sniffing / confusion attacks --
    X-Content-Type-Options = "nosniff"

    # -- Disable legacy XSS filter (OWASP recommends off; CSP replaces it) --
    X-XSS-Protection = "0"

    # -- Limit referrer leakage for user privacy --
    Referrer-Policy = "strict-origin-when-cross-origin"

    # -- Force HTTPS for 2 years + preload list eligibility --
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # -- Content Security Policy --
    # Self-contained site: own scripts, styles, fonts, images allowed.
    # Google Fonts (fonts.googleapis.com for CSS, fonts.gstatic.com for
    # font files) allowed for CJK font loading when a non-Latin language
    # is selected via the language switcher.
    # Google Apps Script (script.google.com) allowed for the inline
    # editing feedback system — edits are logged to a Google Sheet.
    # frame-ancestors 'none' replaces X-Frame-Options for modern browsers.
    # form-action 'self' allows mailto: links but blocks external form posts.
    # The sha256 hashes whitelist inline scripts and styles across all pages:
    #   script-src hashes:
    #     2se67j... = index.html JSON-LD structured data
    #     /svvI+... = index.html FOUC guard removal + rAF + bfcache reload
    #     bg6I/z... = index.html SW registration + controllerchange
    #     iVb8AV... = 404.html FOUC guard removal + rAF
    #     +s8TkJ... = 404.html lang-aware title observer
    #     C2bqz1... = cicero.html FOUC guard removal + rAF
    #     GjEV8W... = offline.html retry button handler
    #     OvGvX8... = cicero.html .is-source-lang class (English hover fix)
    #   style-src hashes:
    #     hE4OtW... = 404.html entrance animations
    #     HviAbv... = offline.html self-contained styles
    #     B3RmA7... = FOUC guard inline style (all pages)
    #     Qz41X5... = cicero.html editable-en-guard (English hover fix)
    # To regenerate hashes after editing inline content:
    #   python3 -c "import re,hashlib,base64;h=open('FILE.html').read();[print('sha256-'+base64.b64encode(hashlib.sha256(m.group(2).encode()).digest()).decode()) for m in re.finditer(r'<(script|style)([^>]*)>(.*?)</\\1>',h,re.DOTALL) if 'src=' not in m.group(2) and m.group(3).strip()]"
    # manifest-src 'self' allows the PWA manifest.json to be loaded.
    # worker-src 'self' allows the service worker (sw.js) to be registered.
    Content-Security-Policy = "default-src 'none'; script-src 'self' 'sha256-2se67jeqDptuJ195uK1pyIOBC3ZcE4wuRKJrJ4/wB9E=' 'sha256-/svvI+4i8kD0pOJWlVlwsInwtDyBT+g7hoNJNOXW+Rw=' 'sha256-bg6I/zRKDoyBUam4jG6U3ClToOei979pjOum6mmbNBQ=' 'sha256-iVb8AVt2owJg0CoWHKfy6GhTAdPrjJwgu/8X+maGXts=' 'sha256-+s8TkJ5Z99YKtAMyghilURDLxZ25lIBbzWE8Buam4sA=' 'sha256-C2bqz1qy1p7Y/5iYznaHnkxstHtTAhYbPpT9T4StdYs=' 'sha256-GjEV8Wo4B6ytLaM4dCeuWuE4AoK511PUbU+DWjdyjJQ=' 'sha256-OvGvX889EZJB4u81dZzatGgM2eOdg+oOMeAko0IUkV4='; style-src 'self' https://fonts.googleapis.com 'sha256-hE4OtW+OL886wD+ApYbWgyTXd5mLqZzBWuQXSN6ucPE=' 'sha256-HviAbv7MGUpFm8iX9mjlQ4c3i+KhzCQxk0MpI8/Cqjs=' 'sha256-B3RmA7pKFzSG13mhQcZHuHWgE+slkmcZti0ek8GFSHI=' 'sha256-Qz41X5liHWcxgiwhNwCA3XiKmiwjTkifaEzayXFHoBU='; font-src 'self' https://fonts.gstatic.com; img-src 'self'; connect-src 'self' https://script.google.com; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"

    # -- Disable browser features we don't use --
    # interest-cohort=() blocks Google FLoC tracking.
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), usb=(), magnetometer=(), gyroscope=(self), accelerometer=(self)"

    # -- Prevent cross-origin window interaction --
    Cross-Origin-Opener-Policy = "same-origin"

    # -- Prevent other sites from embedding our resources --
    Cross-Origin-Resource-Policy = "same-origin"

# ============================================================
# CACHE CONTROL
#
# Strategy: Content-hashed filenames for CSS/JS (Pattern 1 from
# Jake Archibald's caching best practices). Each CSS/JS file
# has an 8-char MD5 hash in its filename that changes when the
# content changes. This means:
#
#   - Changed files → new URL → browser fetches fresh copy
#   - Unchanged files → same URL → browser uses cache (zero network)
#   - No manual version bumping required
#   - No race conditions between old HTML + new CSS/JS
#
# HTML uses Pattern 2: always revalidate with the server.
# The browser sends If-None-Match (ETag) and gets a fast 304
# if nothing changed, or the new content if it did.
#
# Reference: https://jakearchibald.com/2016/caching-best-practices/
# Reference: https://web.dev/articles/use-long-term-caching
# ============================================================

# Service Worker — MUST never be cached by the CDN or browser.
# Browsers already byte-compare sw.js on every navigation to detect
# updates, but if the CDN serves a stale copy, the browser never
# sees the new bytes. no-store ensures Netlify's edge and the
# browser always fetch the latest sw.js from origin.
# Reference: https://web.dev/articles/service-worker-lifecycle#avoid_changing_the_url_of_your_service_worker_script
# Reference: https://developers.google.com/web/updates/2018/06/fresher-sw
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# CSS files — immutable, long cache (content-hashed filenames)
# Since filenames contain a content hash (e.g., styles.a1b2c3d4.css),
# the URL changes whenever the content changes. Safe to cache forever.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JavaScript files — immutable, long cache (content-hashed filenames)
# Same as CSS: filenames contain content hashes, safe to cache forever.
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Assets (fonts, images, icons) — long cache OK, these rarely change
# and are referenced by stable filenames
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML — always revalidate (Pattern 2)
# The browser checks with the server on every visit. If the HTML
# hasn't changed, it gets a fast 304 Not Modified. If it has,
# the new HTML references new content-hashed CSS/JS URLs, so
# the browser fetches those fresh too. This is the atomic
# update mechanism.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Manifest, robots, sitemap — mutable metadata files.
# These should always revalidate since they may change between deploys.
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# ============================================================
# POST PROCESSING
# Disable CSS/JS bundling/minification to prevent Netlify
# from breaking valid styles (known issue with static sites).
# ============================================================
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# ============================================================
# REDIRECTS
# Redirect old .html URLs to clean paths for SEO and consistency.
# 301 = permanent redirect (browsers and search engines cache it).
# ============================================================
[[redirects]]
  from = "/cicero.html"
  to = "/cicero"
  status = 301
  force = true

# Also ensure /cicero (the pretty URL) gets the same cache headers as HTML
[[headers]]
  for = "/cicero"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ============================================================
# CUSTOM ERROR PAGES
# Netlify automatically serves 404.html for any path that
# doesn't resolve to a static file.
# Reference: https://docs.netlify.com/routing/redirects/redirect-options/#custom-404-page-handling
# ============================================================
