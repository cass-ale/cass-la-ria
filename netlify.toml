# ============================================================
# Netlify Configuration — Cass la Ria
# Plain static site (HTML/CSS/JS). No build step.
#
# Security headers follow OWASP HTTP Headers Cheat Sheet:
# https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html
# ============================================================

[build]
  # No build command — the site is pre-built static files.
  publish = "."

# ============================================================
# GLOBAL SECURITY & PRIVACY HEADERS
# Applied to every response from the site.
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    # -- Clickjacking protection --
    X-Frame-Options = "DENY"

    # -- Prevent MIME type sniffing / confusion attacks --
    X-Content-Type-Options = "nosniff"

    # -- Disable legacy XSS filter (OWASP recommends off; CSP replaces it) --
    X-XSS-Protection = "0"

    # -- Limit referrer leakage for user privacy --
    Referrer-Policy = "strict-origin-when-cross-origin"

    # -- Force HTTPS for 2 years + preload list eligibility --
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # -- Content Security Policy --
    # Self-contained site: own scripts, styles, fonts, images allowed.
    # Google Fonts (fonts.googleapis.com for CSS, fonts.gstatic.com for
    # font files) allowed for CJK font loading when a non-Latin language
    # is selected via the language switcher.
    # Google Apps Script (script.google.com) allowed for the inline
    # editing feedback system — edits are logged to a Google Sheet.
    # frame-ancestors 'none' replaces X-Frame-Options for modern browsers.
    # form-action 'self' allows mailto: links but blocks external form posts.
    # The sha256 hashes whitelist inline scripts and styles across all pages:
    #   script-src hashes:
    #     2se67j... = index.html JSON-LD structured data
    #     bg6I/z... = index.html SW registration + controllerchange + auto-reload
    #     +s8TkJ... = 404.html lang-aware title observer
    #     GjEV8W... = offline.html retry button click handler
    #   style-src hashes:
    #     hE4OtW... = 404.html entrance animations
    #     HviAbv... = offline.html self-contained styles
    # To regenerate hashes after editing inline content:
    #   python3 -c "import re,hashlib,base64;h=open('FILE.html').read();[print('sha256-'+base64.b64encode(hashlib.sha256(m.group(2).encode()).digest()).decode()) for m in re.finditer(r'<(script|style)([^>]*)>(.*?)</\\1>',h,re.DOTALL) if 'src=' not in m.group(2) and m.group(3).strip()]"
    # manifest-src 'self' allows the PWA manifest.json to be loaded.
    # worker-src 'self' allows the service worker (sw.js) to be registered.
    Content-Security-Policy = "default-src 'none'; script-src 'self' 'sha256-2se67jeqDptuJ195uK1pyIOBC3ZcE4wuRKJrJ4/wB9E=' 'sha256-bg6I/zRKDoyBUam4jG6U3ClToOei979pjOum6mmbNBQ=' 'sha256-+s8TkJ5Z99YKtAMyghilURDLxZ25lIBbzWE8Buam4sA=' 'sha256-GjEV8Wo4B6ytLaM4dCeuWuE4AoK511PUbU+DWjdyjJQ='; style-src 'self' https://fonts.googleapis.com 'sha256-hE4OtW+OL886wD+ApYbWgyTXd5mLqZzBWuQXSN6ucPE=' 'sha256-HviAbv7MGUpFm8iX9mjlQ4c3i+KhzCQxk0MpI8/Cqjs='; font-src 'self' https://fonts.gstatic.com; img-src 'self'; connect-src 'self' https://script.google.com; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"

    # -- Disable browser features we don't use --
    # interest-cohort=() blocks Google FLoC tracking.
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), usb=(), magnetometer=(), gyroscope=(self), accelerometer=(self)"

    # -- Prevent cross-origin window interaction --
    Cross-Origin-Opener-Policy = "same-origin"

    # -- Prevent other sites from embedding our resources --
    Cross-Origin-Resource-Policy = "same-origin"

# ============================================================
# CACHE CONTROL
#
# Strategy: Cache with revalidation for CSS/JS since this is a
# plain static site without filename hashing. The browser will
# cache files but check with the server (via ETag/If-None-Match)
# on each visit. This gives fast loads (304 Not Modified) while
# ensuring updates are always picked up.
#
# "immutable" is only safe with content-hashed filenames
# (e.g., main.a1b2c3.css) — without hashing, it causes stale
# cache issues that are impossible to fix without user action.
#
# Reference: web.dev/http-cache
# Reference: jakearchibald.com/2016/caching-best-practices
# ============================================================

# Service Worker — MUST never be cached by the CDN or browser.
# Browsers already byte-compare sw.js on every navigation to detect
# updates, but if the CDN serves a stale copy, the browser never
# sees the new bytes. no-store ensures Netlify's edge and the
# browser always fetch the latest sw.js from origin.
# Reference: https://web.dev/articles/service-worker-lifecycle#avoid_changing_the_url_of_your_service_worker_script
# Reference: https://developers.google.com/web/updates/2018/06/fresher-sw
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# CSS files — always revalidate (cache busted via ?v= query strings)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# JavaScript files — always revalidate (cache busted via ?v= query strings)
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Assets (fonts, images, icons) — long cache OK, these rarely change
# and are referenced by stable filenames
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML — always revalidate
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ============================================================
# POST PROCESSING
# Disable CSS/JS bundling/minification to prevent Netlify
# from breaking valid styles (known issue with static sites).
# ============================================================
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# ============================================================
# CUSTOM ERROR PAGES
# Netlify automatically serves 404.html for any path that
# doesn't resolve to a static file.
# Reference: https://docs.netlify.com/routing/redirects/redirect-options/#custom-404-page-handling
# ============================================================
