<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- ============================================================
       404 — Page Not Found
       Custom error page for Cass la Ria.
       Maintains the full site aesthetic: rain/weather system,
       time-based theming, wet text effect, and multilingual support.
       ============================================================ -->

  <title>404 — Cass la Ria</title>
  <meta name="description" content="Page not found — Cass la Ria" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#f2d4d7" />

  <!-- Privacy & Security meta tags -->
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />

  <!-- Mobile meta tags -->
  <meta name="MobileOptimized" content="width" />
  <meta name="HandheldFriendly" content="true" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png" />

  <!-- Fonts -->
  <link rel="stylesheet" href="/css/fonts.css?v=4" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/css/fonts-cjk.css?v=2" />

  <!-- Styles -->
  <link rel="stylesheet" href="/css/variables.css?v=4" />
  <link rel="stylesheet" href="/css/reset.css?v=4" />
  <link rel="stylesheet" href="/css/layout.css?v=4" />
  <link rel="stylesheet" href="/css/components.css?v=4" />
  <link rel="stylesheet" href="/css/rain.css?v=5" />

  <!-- Error page specific styles -->
  <style>
    /* ---- Entrance animations (self-contained for error pages) ---- */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes rule-grow {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    /* ---- Error code heading ---- */
    .error__code {
      font-family: var(--font-display);
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--color-text);
      font-size: clamp(3rem, 12vw + 1rem, 8rem);
      line-height: 1;
      animation: fade-up 1s var(--ease-out) 0.15s both;
    }

    /* ---- Subtitle / message ---- */
    .error__message {
      font-family: var(--font-display);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.08em;
      color: var(--color-text-muted);
      font-size: clamp(0.875rem, 2vw + 0.25rem, 1.25rem);
      line-height: 1.5;
      text-align: center;
      max-width: 400px;
      animation: fade-up 0.8s var(--ease-out) 0.45s both;
    }

    .hero__rule {
      transform-origin: center;
      animation: rule-grow 0.8s var(--ease-out) 0.55s both;
    }

    /* ---- Return home button ---- */
    .error__home {
      animation: fade-up 0.7s var(--ease-out) 0.85s both;
    }

    .frame {
      animation: fade-in 1.2s var(--ease-out) 0.3s both;
    }

    /* ---- Reduced motion ---- */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-delay: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <a href="#main-content" class="skip-link" data-i18n="skip-link">Skip to content</a>

  <main id="main-content" class="hero">
    <!-- Decorative border frame -->
    <div class="frame" aria-hidden="true"></div>

    <!-- Error content -->
    <header class="hero__header">
      <h1 class="error__code" id="hero-name" aria-label="Error 404">404</h1>
      <div class="hero__rule" aria-hidden="true"></div>
      <p class="error__message" data-i18n="error-404-message">This page was lost in the rain</p>
    </header>

    <!-- Return home button -->
    <div class="error__home">
      <a
        href="/"
        class="btn btn--contact"
        aria-label="Return to homepage"
      >
        <svg class="btn__icon btn__icon--contact" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span data-i18n="error-home-btn">Return Home</span>
      </a>
    </div>
  </main>

  <!-- Language switcher -->
  <div class="lang-switcher" role="navigation" aria-label="Language">
    <button
      class="lang-switcher__trigger"
      aria-expanded="false"
      aria-haspopup="listbox"
      aria-label="Change language"
      id="lang-trigger"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" />
        <path d="M2 12h20" />
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
      </svg>
    </button>
    <ul class="lang-switcher__list" role="listbox" id="lang-list" aria-label="Select language">
      <li role="option"><button class="lang-switcher__option" data-lang="en" aria-current="true">English</button></li>
      <li role="option"><button class="lang-switcher__option" data-lang="es">Español</button></li>
      <li role="option"><button class="lang-switcher__option" data-lang="pt">Português</button></li>
      <li role="option"><button class="lang-switcher__option" data-lang="fr">Français</button></li>
      <li role="option"><button class="lang-switcher__option" data-lang="ja">日本語</button></li>
      <li role="option"><button class="lang-switcher__option" data-lang="ko">한국어</button></li>
      <li role="option"><button class="lang-switcher__option" data-lang="id">Indonesia</button></li>
      <li role="option"><button class="lang-switcher__option" data-lang="zh">中文</button></li>
    </ul>
  </div>

  <!-- Site credit (hidden from visual display, visible to crawlers and view-source) -->
  <!-- Site designed and built by Cass Aleria -->

  <!-- Scripts — same systems as main site for full aesthetic consistency -->
  <script src="/js/i18n.js?v=5"></script>
  <script src="/js/main.js?v=6"></script>
  <script src="/js/time-theme.js?v=1"></script>
  <script src="/js/rain.js?v=15"></script>
  <script src="/js/wet-text.js?v=4"></script>

  <!-- Update page title based on language -->
  <script>
  (function() {
    'use strict';

    /* Override the meta-title for error pages */
    var errorTitles = {
      en: '404 — Cass la Ria',
      es: '404 — Cass la Ria',
      pt: '404 — Cass la Ria',
      fr: '404 — Cass la Ria',
      ja: '404 — Cass la Ria',
      ko: '404 — Cass la Ria',
      id: '404 — Cass la Ria',
      zh: '404 — Cass la Ria'
    };

    /* Watch for language changes and update the title */
    var observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        if (m.attributeName === 'lang') {
          var lang = document.documentElement.lang || 'en';
          document.title = errorTitles[lang] || errorTitles.en;
        }
      });
    });
    observer.observe(document.documentElement, { attributes: true });

    /* Set initial title */
    var lang = document.documentElement.lang || 'en';
    document.title = errorTitles[lang] || errorTitles.en;
  })();
  </script>
</body>
</html>
